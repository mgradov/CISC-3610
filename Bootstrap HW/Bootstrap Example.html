<!-- Document Declaration: Declare HTML5 standard and open root element -->
<!DOCTYPE html>                                                         <!-- Declares HTML5 doctype so the browser renders in standards mode -->
<html lang="en">                                                        <!-- Opens the root element and sets language to English for accessibility -->

<!-- Head Section: Configure metadata, title, and load Bootstrap CSS -->
<head>                                                                  <!-- Opens the head which holds all non-visible page configuration -->
    <meta charset="UTF-8">                                              <!-- Sets character encoding to UTF-8 to support standard text characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the page responsive by matching viewport width to the device -->
    <title>Bootstrap Grid Example</title>                               <!-- Sets the browser tab title to identify the page -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Loads Bootstrap 5.3.2 CSS from CDN to enable grid and utility classes -->
    <style>

        /* Demo Box Base Style: Define shared visual properties for every colored column block */
        .demo-box {                          /* Targets .demo-box class applied to every colored column */
            color: white;                  /* Sets text to white for contrast against dark backgrounds */
            padding: 20px;                   /* Adds inner spacing so text does not touch the box edge */
            margin-bottom: 15px;             /* Separates stacked columns with space below each box */
            text-align: center;              /* Centers the label text horizontally within the box */
            border-radius: 8px;              /* Rounds corners for a softer, modern appearance */
            font-weight: bold;               /* Makes label text bold for easy readability */
        }

        /* Box Background Colors: Assign a distinct color to each box for visual identification */
        .bg-1 { background-color: #0d6efd; } /* Applies Bootstrap's primary blue to box 1 */
        .bg-2 { background-color: #6610f2; } /* Applies Bootstrap's indigo/purple to box 2 */
        .bg-3 { background-color: #198754; } /* Applies Bootstrap's green to box 3 */
        .bg-4 { background-color: #fd7e14; } /* Applies Bootstrap's orange to box 4 */
        .bg-5 { background-color: #dc3545; } /* Applies Bootstrap's red to box 5 */

    </style>
</head>                                                                 <!-- Closes the head section -->

<!-- Body Section: Render all visible page content inside a Bootstrap container -->
<body>                                                                  <!-- Opens the body which holds all visible page content -->

    <!-- Page Container & Heading: Wrap grid rows in a centered container and display the title -->
    <div class="container py-5">                                        <!-- Bootstrap container centers content; py-5 adds vertical padding -->
        <h2 class="text-center mb-4">Mixed Column Widths</h2>           <!-- Section heading; text-center centers it, mb-4 adds bottom margin -->

        <!-- Row 1 — Main Content & Sidebar: Two-column layout, 8/12 main and 4/12 sidebar on medium+ screens -->
        <div class="row">                                               <!-- Opens a Bootstrap row creating a horizontal flexbox group -->
            <div class="col-12 col-md-8">                               <!-- Full width on small screens; 8 of 12 columns on medium+ for main content -->
                <div class="demo-box bg-1">Main Content (12 / 8)</div>  <!-- Blue box; label shows column width at each breakpoint -->
            </div>                                                      <!-- Closes main content column -->
            <div class="col-12 col-md-4">                               <!-- Full width on small screens; 4 of 12 columns on medium+ for sidebar -->
                <div class="demo-box bg-2">Sidebar (12 / 4)</div>       <!-- Purple box; label shows column width at each breakpoint -->
            </div>                                                      <!-- Closes sidebar column -->
        </div>                                                          <!-- Closes Row 1 -->

        <!-- Row 2 — Three Mixed-Width Columns: Two quarter-width and one half-width column on medium+ screens -->
        <div class="row">                                               <!-- Opens a second Bootstrap row for the three mixed-width columns -->
            <div class="col-6 col-md-3">                                <!-- Half width on small screens; quarter width on medium+ screens -->
                <div class="demo-box bg-3">6 / 3</div>                  <!-- Green box; label shows col-6 on small and col-md-3 on medium -->
            </div>                                                      <!-- Closes first quarter-width column -->
            <div class="col-6 col-md-3">                                <!-- Half width on small screens; quarter width on medium+ screens -->
                <div class="demo-box bg-4">6 / 3</div>                  <!-- Orange box; label shows col-6 on small and col-md-3 on medium -->
            </div>                                                      <!-- Closes second quarter-width column -->
            <div class="col-12 col-md-6">                               <!-- Full width on small screens; half width on medium+ screens -->
                <div class="demo-box bg-5">12 / 6</div>                 <!-- Red box; label shows col-12 on small and col-md-6 on medium -->
            </div>                                                      <!-- Closes half-width column -->
        </div>                                                          <!-- Closes Row 2 -->
    </div>                                                              <!-- Closes the Bootstrap container -->

    <!-- Bootstrap JS Bundle: Load Bootstrap JS from CDN to enable interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> <!-- Loads Bootstrap's bundled JS with Popper.js for interactive component support -->
</body>                                                                  <!-- Closes the body element -->
</html>                                                                  <!-- Closes the root HTML element -->
